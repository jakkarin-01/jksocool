<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Color Detection</title>

  <!-- TensorFlow.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>

  <!-- Teachable Machine Image (ตัวที่แน่นอนว่าใช้ได้) -->
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
  
  <!-- MQTT -->
  <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
</head>

<body>
  <h2>Teachable Machine - Color Detection</h2>
  <button onclick="init()">Start Camera</button>

  <div id="webcam-container"></div>
  <div id="label-container"></div>

  <!-- 👉 วาง script ตรงนี้ -->
  <script>
/* ===============================
   1) Teachable Machine config
================================ */
const URL = "https://teachablemachine.withgoogle.com/models/_kpwLakFR/";

let model, webcam, labelContainer, maxPredictions;

/* ===============================
   2) MQTT CONFIG
================================ */
const mqttClient = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");
const MQTT_TOPIC = "jksocool/color";

mqttClient.on("connect", () => {
  console.log("✅ MQTT Connected");
});

/* ===============================
   3) TIMER CONFIG (2 วินาที)
================================ */
let lastSendTime = 0;
const SEND_INTERVAL = 5000; // 2 วินาที

/* ===============================
   4) INIT
================================ */
async function init() {
  const modelURL = URL + "model.json";
  const metadataURL = URL + "metadata.json";

  model = await tmImage.load(modelURL, metadataURL);
  maxPredictions = model.getTotalClasses();

  webcam = new tmImage.Webcam(200, 200, true);
  await webcam.setup();
  await webcam.play();
  window.requestAnimationFrame(loop);

  document.getElementById("webcam-container").appendChild(webcam.canvas);
  labelContainer = document.getElementById("label-container");

  for (let i = 0; i < maxPredictions; i++) {
    labelContainer.appendChild(document.createElement("div"));
  }
}

/* ===============================
   5) LOOP
================================ */
async function loop() {
  webcam.update();
  await predict();
  window.requestAnimationFrame(loop);
}

/* ===============================
   6) PREDICT + SEND MQTT (2 วิ/ครั้ง)
================================ */
async function predict() {
  const prediction = await model.predict(webcam.canvas);

  let detectedColor = "none";
  let maxProb = 0;

  for (let i = 0; i < maxPredictions; i++) {
    const prob = prediction[i].probability;
    labelContainer.childNodes[i].innerHTML =
      prediction[i].className + ": " + prob.toFixed(2);

    if (prob > maxProb) {
      maxProb = prob;
      detectedColor = prediction[i].className;
    }
  }

  const now = Date.now();

  // ส่ง MQTT ทุก 2 วินาที และต้องมั่นใจ100
  if (maxProb = 1 && now - lastSendTime >= SEND_INTERVAL) {
    mqttClient.publish(MQTT_TOPIC, detectedColor);
    console.log("📤 Send MQTT:", detectedColor);

    lastSendTime = now;
  }
}
</script>
